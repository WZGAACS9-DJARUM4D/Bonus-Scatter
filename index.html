<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMUS PG SOFT</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --argentina-img:url("");
    --logo:url("https://cdn.bunkerkiamat.com/djarum4d/images/logo/Djarum4d.gif");
    --blue:#74d8ff;
    --gold:#ffd75a;
    --dark:#020b18;
}

body{
    min-height:100vh;
    font-family:'Segoe UI',Arial,sans-serif;
    color:#fff;
    overflow-x:hidden;
    background:#020b18;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:
        linear-gradient(180deg,rgba(0,40,90,.25),rgba(0,5,18,.96)),
        var(--argentina-img);
    background-size:cover;
    background-position:center top;
    z-index:-20;
    filter:brightness(.82) contrast(1.18) saturate(1.25);
    animation:bgPremium 16s ease-in-out infinite alternate;
}

@keyframes bgPremium{
    0%{transform:scale(1);}
    100%{transform:scale(1.13);}
}

/* GRADIENT OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    z-index:-19;
    background:
        radial-gradient(circle at 20% 20%,rgba(116,216,255,.28),transparent 35%),
        radial-gradient(circle at 80% 30%,rgba(255,215,90,.22),transparent 35%),
        radial-gradient(circle at 50% 90%,rgba(0,100,255,.25),transparent 45%);
    animation:overlayMove 8s ease-in-out infinite alternate;
}

@keyframes overlayMove{
    from{filter:hue-rotate(0deg);}
    to{filter:hue-rotate(18deg);}
}

/* LIGHT */
.light{
    position:fixed;
    width:40vw;
    height:130vh;
    top:-25vh;
    background:linear-gradient(to bottom,rgba(255,255,255,.24),transparent 75%);
    filter:blur(24px);
    z-index:-18;
    opacity:.7;
    animation:lightMove 6s ease-in-out infinite alternate;
}

.light.left{
    left:-12vw;
    transform:rotate(24deg);
}

.light.right{
    right:-12vw;
    transform:rotate(-24deg);
    animation-delay:1.2s;
}

@keyframes lightMove{
    from{opacity:.25;}
    to{opacity:.85;}
}

/* PARTICLE */
.particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-16;
    background-image:
        radial-gradient(#fff 1px,transparent 1px),
        radial-gradient(#74d8ff 1px,transparent 1px),
        radial-gradient(#ffd75a 1.4px,transparent 1.4px);
    background-size:80px 80px,130px 130px,170px 170px;
    opacity:.42;
    animation:particleFall 18s linear infinite;
}

@keyframes particleFall{
    from{background-position:0 0,0 0,0 0;}
    to{background-position:0 900px,280px 800px,-250px 700px;}
}

/* MOVING BALL */
.ball{
    position:fixed;
    right:36px;
    bottom:42px;
    width:105px;
    height:105px;
    border-radius:50%;
    background:url("https://cdn-icons-png.flaticon.com/512/53/53283.png") center/cover no-repeat;
    z-index:30;
    filter:
        drop-shadow(0 0 12px white)
        drop-shadow(0 0 25px #74d8ff)
        drop-shadow(0 0 42px #ffd75a);
    animation:ballMove 5s ease-in-out infinite, ballSpin 3.5s linear infinite;
}

@keyframes ballMove{
    0%,100%{bottom:42px;right:36px;}
    50%{bottom:78px;right:55px;}
}

@keyframes ballSpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* INTRO */
.initial-view{
    position:fixed;
    inset:0;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,10,25,.78);
    backdrop-filter:blur(16px);
    overflow:hidden;
}

.initial-view::before{
    content:"";
    position:absolute;
    inset:-20%;
    background:
        linear-gradient(120deg,transparent,rgba(255,255,255,.18),transparent),
        var(--argentina-img);
    background-size:cover;
    background-position:center;
    filter:blur(2px) saturate(1.35);
    animation:introMove 12s ease-in-out infinite alternate;
    z-index:-3;
}

@keyframes introMove{
    from{transform:scale(1);}
    to{transform:scale(1.16) translateX(-40px);}
}

.initial-view::after{
    content:"";
    position:absolute;
    width:45%;
    height:160%;
    background:linear-gradient(to bottom,transparent,rgba(255,255,255,.30),transparent);
    transform:rotate(25deg);
    animation:shineSweep 3.5s linear infinite;
    z-index:-2;
}

@keyframes shineSweep{
    from{left:-60%;}
    to{left:120%;}
}

.intro-card{
    width:430px;
    max-width:92%;
    padding:44px 30px;
    border-radius:34px;
    text-align:center;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    background:
        linear-gradient(160deg,rgba(116,216,255,.35),rgba(255,255,255,.14),rgba(255,215,90,.28));
    border:1px solid rgba(255,255,255,.45);
    box-shadow:
        0 0 70px rgba(116,216,255,.8),
        inset 0 0 45px rgba(255,255,255,.18);
    animation:introFloat 3s ease-in-out infinite;
}

@keyframes introFloat{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-14px) scale(1.035);}
}

.intro-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.30),transparent);
    transform:translateX(-130%);
    animation:cardShine 2.7s linear infinite;
}

@keyframes cardShine{
    to{transform:translateX(130%);}
}

.intro-card i{
    font-size:88px;
    color:var(--gold);
    margin-bottom:20px;
    text-shadow:0 0 25px var(--gold),0 0 60px #fff;
    animation:trophyPremium 2.8s linear infinite;
}

@keyframes trophyPremium{
    0%{transform:rotateY(0deg) scale(1);}
    50%{transform:rotateY(180deg) scale(1.12);}
    100%{transform:rotateY(360deg) scale(1);}
}

.intro-card h1{
    font-size:34px;
    font-weight:1000;
    letter-spacing:1px;
    text-transform:uppercase;
    text-shadow:0 0 22px #74d8ff;
    animation:textGlow 1.5s ease-in-out infinite alternate;
}

@keyframes textGlow{
    from{text-shadow:0 0 14px #74d8ff;}
    to{text-shadow:0 0 32px #74d8ff,0 0 60px var(--gold);}
}

.intro-card p{
    margin-top:12px;
    color:#eafaff;
    font-weight:600;
}

/* MAIN */
.main-content{
    display:none;
    padding:34px 16px;
    animation:fadeIn .8s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:scale(.96);}
    to{opacity:1;transform:scale(1);}
}

.container{
    max-width:1280px;
    margin:auto;
    overflow:hidden;
    border-radius:38px;
    position:relative;
    background:rgba(0,18,45,.78);
    border:1px solid rgba(255,255,255,.30);
    backdrop-filter:blur(20px);
    box-shadow:
        0 0 80px rgba(116,216,255,.60),
        inset 0 0 55px rgba(255,255,255,.10);
    animation:containerFloat 5s ease-in-out infinite;
}

@keyframes containerFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-7px);}
}

.container::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.10),transparent);
    transform:translateX(-120%);
    animation:containerShine 5s linear infinite;
    pointer-events:none;
}

@keyframes containerShine{
    to{transform:translateX(120%);}
}

/* HERO */
.hero{
    min-height:450px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:64px 24px;
    overflow:hidden;
    background:
        linear-gradient(180deg,rgba(0,25,70,.15),rgba(0,5,18,.94)),
        var(--argentina-img);
    background-position:center top;
    background-size:cover;
    animation:heroZoom 12s ease-in-out infinite alternate;
}

@keyframes heroZoom{
    from{background-size:100%;}
    to{background-size:118%;}
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(90deg,rgba(0,0,0,.72),transparent,rgba(0,0,0,.60)),
        radial-gradient(circle at center,transparent 18%,rgba(0,0,0,.70) 78%);
}

.hero::after{
    content:"";
    position:absolute;
    width:55%;
    height:160%;
    background:linear-gradient(to bottom,transparent,rgba(255,255,255,.20),transparent);
    transform:rotate(25deg);
    animation:heroLight 5s linear infinite;
}

@keyframes heroLight{
    from{left:-70%;}
    to{left:130%;}
}

.logo-djarum{
    position:absolute;
    top:18px;
    right:20px;
    width:155px;
    z-index:5;
    animation:logoPulse 1.6s infinite alternate;
}

@keyframes logoPulse{
    from{filter:drop-shadow(0 0 8px #fff);}
    to{
        filter:
        drop-shadow(0 0 18px #74d8ff)
        drop-shadow(0 0 35px var(--gold));
    }
}

.hero-content{
    position:relative;
    z-index:3;
    animation:heroContentMove 3.2s ease-in-out infinite;
}

@keyframes heroContentMove{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-11px);}
}

.badge{
    display:inline-block;
    padding:10px 26px;
    border-radius:100px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.48);
    color:#fff;
    font-size:13px;
    font-weight:1000;
    letter-spacing:3px;
    box-shadow:0 0 20px rgba(116,216,255,.65);
    animation:badgeGlow 1.4s infinite alternate;
}

@keyframes badgeGlow{
    from{box-shadow:0 0 14px #74d8ff;}
    to{box-shadow:0 0 32px var(--gold);}
}

.hero h2{
    margin-top:20px;
    font-size:68px;
    line-height:.92;
    font-weight:1000;
    text-transform:uppercase;
    animation:neonTitle 1.8s infinite alternate;
}

@keyframes neonTitle{
    from{
        text-shadow:
        0 0 8px #fff,
        0 0 20px #74d8ff,
        0 0 42px #008dff;
    }
    to{
        text-shadow:
        0 0 18px #fff,
        0 0 38px #74d8ff,
        0 0 80px #008dff,
        0 0 120px var(--gold);
    }
}

.hero h3{
    margin-top:18px;
    font-size:27px;
    color:var(--gold);
    text-shadow:0 0 20px var(--gold);
    animation:goldMove 1.7s infinite alternate;
}

@keyframes goldMove{
    from{letter-spacing:0;}
    to{letter-spacing:1.4px;}
}

.hero p{
    margin:16px auto 0;
    max-width:770px;
    font-size:17px;
    line-height:1.6;
    color:#eafaff;
}

/* CONTENT */
.content-area{
    padding:34px;
}

.section-title{
    font-size:29px;
    margin-bottom:18px;
    color:#8fe3ff;
    text-shadow:0 0 24px #00aaff;
    animation:titleSlide 2.2s ease-in-out infinite alternate;
}

@keyframes titleSlide{
    from{transform:translateX(0);}
    to{transform:translateX(9px);}
}

.textarea-wrap{
    padding:3px;
    border-radius:24px;
    background:linear-gradient(135deg,#74d8ff,#ffffff,#ffd75a,#74d8ff);
    background-size:300% 300%;
    animation:borderFlow 3s linear infinite;
    box-shadow:0 0 30px rgba(116,216,255,.55);
}

@keyframes borderFlow{
    0%{background-position:0 50%;}
    100%{background-position:300% 50%;}
}

textarea{
    width:100%;
    min-height:240px;
    resize:vertical;
    border:none;
    outline:none;
    border-radius:21px;
    padding:21px;
    color:#fff;
    font-size:16px;
    background:rgba(0,12,35,.97);
    box-shadow:inset 0 0 34px rgba(116,216,255,.27);
}

textarea::placeholder{
    color:#bcefff;
}

.button-container{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    margin:22px 0;
}

button{
    border:none;
    cursor:pointer;
    border-radius:16px;
    padding:15px 25px;
    font-weight:1000;
    color:#001d34;
    background:linear-gradient(135deg,#ffffff,#74d8ff,#ffd75a);
    box-shadow:0 0 24px rgba(116,216,255,.65);
    transition:.25s;
}

button:hover{
    transform:translateY(-4px) scale(1.04);
    box-shadow:0 0 40px rgba(255,215,90,.85);
}

.table-wrapper{
    overflow-x:auto;
    border-radius:23px;
    margin-top:17px;
    box-shadow:0 0 38px rgba(116,216,255,.38);
}

table{
    width:100%;
    min-width:1000px;
    border-collapse:collapse;
    background:rgba(0,16,43,.96);
}

th{
    padding:16px 12px;
    background:linear-gradient(135deg,#74d8ff,#ffffff,#ffd75a);
    color:#00213d;
    font-size:13px;
    font-weight:1000;
}

td{
    padding:15px 12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.12);
    color:#fff;
}

tr{
    animation:rowEnter .45s ease forwards;
}

@keyframes rowEnter{
    from{opacity:0;transform:translateY(12px);}
    to{opacity:1;transform:translateY(0);}
}

.btn-table{
    padding:10px 16px;
    font-size:13px;
}

/* ALERT */
.alert-overlay{
    display:none;
    position:fixed;
    inset:0;
    z-index:120;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.70);
    backdrop-filter:blur(8px);
}

.alert-box{
    width:390px;
    max-width:90%;
    padding:32px;
    text-align:center;
    border-radius:30px;
    background:linear-gradient(160deg,rgba(0,75,140,.96),rgba(0,20,55,.98));
    border:1px solid var(--gold);
    box-shadow:
        0 0 60px #74d8ff,
        inset 0 0 42px rgba(255,215,90,.25);
    animation:alertPop .45s ease;
}

@keyframes alertPop{
    from{opacity:0;transform:scale(.75);}
    to{opacity:1;transform:scale(1);}
}

.alert-title{
    font-size:21px;
    font-weight:1000;
    margin-bottom:18px;
    color:#fff;
    text-shadow:0 0 20px var(--gold);
}

@media(max-width:700px){
    .hero{
        min-height:360px;
        padding:48px 18px;
    }

    .hero h2{
        font-size:40px;
    }

    .hero h3{
        font-size:20px;
    }

    .content-area{
        padding:23px;
    }

    .logo-djarum{
        width:110px;
    }

    .ball{
        width:70px;
        height:70px;
        right:18px;
    }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="light left"></div>
<div class="light right"></div>
<div class="particles"></div>
<div class="ball"></div>

<div id="initialView" class="initial-view">
    <div class="intro-card" onclick="showMainContent()">
        <i class="fa-solid fa-trophy"></i>
        <h1>PGSOFT X PIALA DUNIA 2026</h1>
        <p>Klik untuk masuk ke dashboard premium HD</p>
    </div>
</div>

<div id="mainContent" class="main-content">
    <div class="container">

        <div class="hero">
            <img class="logo-djarum" src="https://cdn.bunkerkiamat.com/djarum4d/images/logo/Djarum4d.gif">

            <div class="hero-content">
                <div class="badge">ARGENTINA CHAMPIONS EDITION</div>
                <h2>PG SOFT<br>BONUS SCATTER</h2>
                <h3>Sky Blue • White • Gold Trophy</h3>
                <p>
                    Wzgaacs9 - Aboy
                </p>
            </div>
        </div>

        <div class="content-area">
            <h2 class="section-title">Data Transaksi</h2>

            <div class="textarea-wrap">
                <textarea id="inputData" placeholder="Tempelkan data transaksi kamu di sini..."></textarea>
            </div>

            <div class="button-container">
                <button onclick="prosesData()">
                    <i class="fas fa-play-circle"></i> Proses Data
                </button>

                <button onclick="resetData()">
                    <i class="fas fa-sync-alt"></i> Reset
                </button>
            </div>

            <div class="table-wrapper">
                <table id="resultTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>USER ID</th>
                            <th>NAMA</th>
                            <th>NO REK</th>
                            <th>PERMAINAN</th>
                            <th>TICKET</th>
                            <th>TOTAL</th>
                            <th>TARUHAN</th>
                            <th>SALIN</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<div id="bonusAlert" class="alert-overlay">
    <div class="alert-box">
        <div class="alert-title">
            Kemenangan Memenuhi Syarat Claim Bonus Harian Slot!
        </div>
        <button class="btn-table" onclick="closeBonusAlert()">Tutup</button>
    </div>
</div>

<script>
function showMainContent(){
    document.getElementById("initialView").style.display="none";
    document.getElementById("mainContent").style.display="block";
}

function closeBonusAlert(){
    document.getElementById("bonusAlert").style.display="none";
}

function resetData(){
    document.getElementById("inputData").value="";
    document.getElementById("resultTable").style.display="none";
    document.querySelector("#resultTable tbody").innerHTML="";
    closeBonusAlert();
}

function prosesData(){
    const input=document.getElementById("inputData").value.trim();

    if(input===""){
        alert("Harap inputkan data!");
        return;
    }

    const lines=input.split(/\n/).map(x=>x.trim()).filter(Boolean);

    let permainan=deteksiPermainan(lines);
    let userId=deteksiUserId(lines);
    let kodeTicket=deteksiKodeTicket(lines,input);
    let totalCredit=hitungTotalCredit(lines);
    let nilaiTaruhan=deteksiDebit(lines);
    const totalKemenangan=formatNominal(totalCredit);

    const dataUntukDisalin =
        `${userId}\t-\t-\t${permainan}\t${kodeTicket}\t${totalKemenangan}\t${nilaiTaruhan}`;

    const tbody=document.querySelector("#resultTable tbody");
    tbody.innerHTML="";

    const tr=document.createElement("tr");

    tr.innerHTML=`
        <td>${userId}</td>
        <td>-</td>
        <td>-</td>
        <td>${permainan}</td>
        <td>${kodeTicket}</td>
        <td>${totalKemenangan}</td>
        <td>${nilaiTaruhan}</td>
        <td>
            <button class="btn-table" data-copy="${dataUntukDisalin}" onclick="salinData(this)">
                <i class="fas fa-copy"></i> Salin
            </button>
        </td>
    `;

    tbody.appendChild(tr);
    document.getElementById("resultTable").style.display="table";

    if(totalCredit >= parseNominal(nilaiTaruhan) * 300){
        document.getElementById("bonusAlert").style.display="flex";
    }
}

function salinData(btn){
    const text=btn.getAttribute("data-copy");

    navigator.clipboard.writeText(text).then(()=>{
        btn.innerHTML='<i class="fas fa-check"></i> Tersalin';

        setTimeout(()=>{
            btn.innerHTML='<i class="fas fa-copy"></i> Salin';
        },1200);
    });
}

function deteksiPermainan(lines){
    const providers=[
        "pgsoft","pragmatic play","habanero","spadegaming","jili","cq9",
        "microgaming","playtech","nolimit","joker","fa chai","fastspin",
        "yggdrasil","red tiger","relax gaming","netent","rtg","slot88",
        "playstar","advantplay","live22","bigpot","skywind","ttg",
        "onetouch","dragoon soft","funky games","playngo","booming games",
        "evoplay","simpleplay"
    ];

    for(let i=0;i<lines.length-1;i++){
        if(providers.some(p=>lines[i+1].toLowerCase().includes(p))){
            return lines[i];
        }
    }

    return "-";
}

function deteksiUserId(lines){
    for(let i=0;i<lines.length;i++){
        if(lines[i].toLowerCase().startsWith("ext. id")){
            if(lines[i+1]) return lines[i+1];
        }
    }

    return "-";
}

function deteksiKodeTicket(lines,input){
    for(let i=0;i<lines.length;i++){
        if(lines[i].toLowerCase()==="debit"){
            for(let j=i-1;j>=0;j--){
                const m=lines[j].match(/^(\d+)-\d+-201-0$/);
                if(m){
                    return m[1];
                }
            }
        }
    }

    const mc=input.match(/CR\d+-(\d+)-101-0/i);
    if(mc) return mc[1];

    const me=input.match(/Ext\.\s*ID\s*:\s*(?:CR)?\d+-(\d+)-(?:101|201)-0/i);
    if(me) return me[1];

    return "-";
}

function hitungTotalCredit(lines){
    let total=0;

    for(let i=0;i<lines.length;i++){
        if(lines[i].toLowerCase()==="credit"){
            total += parseNominal(lines[i+1] || "");
        }
    }

    return total;
}

function deteksiDebit(lines){
    for(let i=0;i<lines.length;i++){
        if(lines[i].toLowerCase()==="debit"){
            return formatNominal(parseNominal(lines[i+1] || ""));
        }
    }

    return "-";
}

function parseNominal(text){
    return Number(
        String(text)
        .replace(/IDR|RP/gi,"")
        .replace(/[^0-9]/g,"")
    ) || 0;
}

function formatNominal(num){
    return Number(num).toLocaleString("en-US");
}
</script>

</body>
</html>
